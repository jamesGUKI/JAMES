<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kathmandu Times</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Georgia','Times New Roman',serif;
}

:root{
    --primary:#000;       /* Black for text */
    --secondary:#555;     /* Gray text */
    --accent:#222;        /* Dark accent */
    --bg:#fdfdfd;         /* White background */
    --modal-bg:rgba(0,0,0,0.7);
}

body{
    min-height:100vh;
    background:var(--bg);
    transition:.4s;
    overflow-x:hidden;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#fff;
    border-bottom:1px solid #ccc;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    color:var(--primary);
}

.nav-buttons{
    display:flex;
    gap:10px;
}

.btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:#f0f0f0;
    font-size:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}
.btn:hover{
    background:#e0e0e0;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px 20px;
}

.hero h1{
    font-size:3rem;
    color:var(--primary);
}

.hero p{
    color:var(--secondary);
    font-size:1.1rem;
    margin-top:10px;
}

/* TICKER */
.ticker{
    margin:25px auto;
    width:80%;
    background:#f7f7f7;
    padding:10px;
    border-radius:30px;
    overflow:hidden;
    border:1px solid #ddd;
}

.ticker span{
    display:inline-block;
    white-space:nowrap;
    animation:move 15s linear infinite;
    color:var(--primary);
    font-weight:600;
}

@keyframes move{
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

/* NEWS MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:var(--modal-bg);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box{
    width:90%;
    max-width:600px;
    height:auto;
    background:white;
    border-radius:10px;
    padding:20px;
    overflow:auto;
}

.categories{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.cat{
    padding:12px 20px;
    border-radius:8px;
    background:#000;
    color:white;
    cursor:pointer;
    font-weight:bold;
    text-align:center;
    transition:.3s;
}
.cat:hover{
    background:#555;
}

/* NEWS ITEMS */
.news-item{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    transition:.2s;
}
.news-item:hover{
    background:#f5f5f5;
}

/* DARK MODE */
.dark{
    background:#111;
    color:#eee;
}

.dark .hero p,
.dark .news-item{
    color:#ccc;
}

.dark .modal-box{
    background:#222;
    color:white;
}

</style>
</head>

<body>

<nav>
    <div class="logo">Kathmandu Times</div>
    <div class="nav-buttons">
        <button class="btn" id="newsBtn">📰</button>
        <button class="btn" id="themeBtn">☀️</button>
    </div>
</nav>

<div class="hero">
    <h1>Kathmandu Times</h1>
    <p>Your trusted news source</p>

    <div class="ticker">
        <span>Breaking: Kathmandu grows smart city tech • Nepal tourism booming • Global markets rise • Weather: Clear skies today</span>
    </div>
</div>

<!-- NEWS MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2>Select News Category</h2>
        <div class="categories">
            <div class="cat" data="city">City</div>
            <div class="cat" data="business">Business</div>
            <div class="cat" data="tech">Technology</div>
            <div class="cat" data="sports">Sports</div>
            <div class="cat" data="world">World</div>
        </div>
        <div id="news"></div>
    </div>
</div>

<script>
/* DARK MODE */
document.getElementById("themeBtn").onclick=()=>{
    document.body.classList.toggle("dark");
};

/* MODAL */
const modal=document.getElementById("modal");
document.getElementById("newsBtn").onclick=()=>{
    modal.style.display="flex";
};
modal.onclick=(e)=>{
    if(e.target===modal) modal.style.display="none";
};

/* NEWS DATA */
const data={
    city:["Road expansion in Kathmandu","Smart traffic lights installed"],
    business:["Stock market rises","Startups attract investors"],
    tech:["AI tools growing fast","New mobile apps launched"],
    sports:["Nepal wins match","Cricket league announced"],
    world:["Global summit held","Economy updates worldwide"]
};

/* CATEGORY CLICK */
document.querySelectorAll(".cat").forEach(btn=>{
    btn.onclick=()=>{
        const key=btn.getAttribute("data");
        const newsBox=document.getElementById("news");
        newsBox.innerHTML="";
        data[key].forEach(n=>{
            let div=document.createElement("div");
            div.className="news-item";
            div.innerText=n;
            newsBox.appendChild(div);
        });
    }
});
</script>

</body>
</html>
